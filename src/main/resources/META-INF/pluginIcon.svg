<svg width="960" height="960" viewBox="0 0 960 960" xmlns="http://www.w3.org/2000/svg">
    <!-- 背景底色 -->
    <rect width="960" height="960" fill="#ffffff"/>
    <!-- 外边框 -->
    <rect x="70" y="70" width="820" height="820" fill="none" stroke="#c87888" stroke-width="3" rx="4"/>

    <!-- 横向网格线 -->
    <g stroke="#e8c8cf" stroke-width="1.5">
        <line x1="70" y1="172" x2="890" y2="172"/>
        <line x1="70" y1="275" x2="890" y2="275"/>
        <line x1="70" y1="378" x2="890" y2="378"/>
        <line x1="70" y1="481" x2="890" y2="481"/>
        <line x1="70" y1="584" x2="890" y2="584"/>
        <line x1="70" y1="687" x2="890" y2="687"/>
        <line x1="70" y1="790" x2="890" y2="790"/>
    </g>

    <!-- 纵向网格线 -->
    <g stroke="#e8c8cf" stroke-width="1.5">
        <line x1="152" y1="70" x2="152" y2="890"/>
        <line x1="290" y1="70" x2="290" y2="890"/>
        <line x1="428" y1="70" x2="428" y2="890"/>
        <line x1="566" y1="70" x2="566" y2="890"/>
        <line x1="704" y1="70" x2="704" y2="890"/>
        <line x1="842" y1="70" x2="842" y2="890"/>
    </g>

    <!-- 斜向上升趋势线 -->
    <line x1="90" y1="740" x2="870" y2="350" stroke="#c87888" stroke-width="2" stroke-dasharray="6 3"/>

    <!-- 模拟波动K线折线走势（匹配原图起伏形态） -->
    <path d="
    M 145 610
    C 155 645, 168 660, 175 700
    C 190 735, 210 720, 225 690
    C 240 655, 255 630, 270 605
    C 285 570, 300 550, 315 595
    C 330 635, 350 615, 365 575
    C 380 530, 395 640, 410 695
    C 425 660, 440 600, 455 560
    C 470 510, 490 470, 505 410
    C 520 370, 535 430, 550 465
    C 565 520, 580 555, 595 495
    C 610 435, 630 385, 645 325
    C 660 265, 675 220, 690 290
    C 705 345, 720 380, 735 360
    C 750 310, 770 270, 785 215
    C 800 165, 815 230, 830 285
    C 845 340, 860 390, 875 270
  " fill="none" stroke="#b83848" stroke-width="3.5"/>

    <!-- 坐标轴刻度文字占位（竖排Y轴、横向X轴） -->
    <g fill="#994455" font-size="26" text-anchor="middle">
        <!-- X轴刻度 -->
        <text x="152" y="920">0</text>
        <text x="290" y="920">20</text>
        <text x="428" y="920">40</text>
        <text x="566" y="920">60</text>
        <text x="704" y="920">80</text>
        <text x="842" y="920">100</text>
    </g>
    <g fill="#994455" font-size="26" text-anchor="middle">
        <!-- Y轴竖排示意 -->
        <text x="45" y="172" writing-mode="vertical-rl">高</text>
        <text x="45" y="275" writing-mode="vertical-rl">价</text>
    </g>
</svg>